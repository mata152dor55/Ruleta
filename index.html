<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ruleta</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <!-- ===== PANTALLA DE LOGIN ===== -->
    <div id="login-screen" class="login-screen">
        <div class="login-card">
            <div class="login-logo">
                <span class="login-logo-icon">🎡</span>
            </div>
            <h1 class="login-title">Ruleta</h1>
            <p class="login-subtitle">Inicia sesión para jugar</p>

            <form id="login-form" class="login-form" novalidate>
                <div class="input-group">
                    <label for="username">Usuario</label>
                    <input type="text" id="username" name="username" placeholder="Tu nombre de usuario"
                        autocomplete="username">
                    <span class="field-error" id="username-error">Este campo es obligatorio.</span>
                </div>

                <div class="input-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" placeholder="Tu contraseña"
                        autocomplete="current-password">
                    <span class="field-error" id="password-error">Este campo es obligatorio.</span>
                </div>

                <button type="submit" class="login-btn" id="login-submit-btn">
                    Entrar
                </button>
            </form>
        </div>
    </div>

    <!-- ===== PANTALLA DE LA RULETA ===== -->
    <div id="game-screen" class="game-screen hidden">
        <div class="app-container">
            <header>
                <h1>Ruleta</h1>
            </header>
        </div>

        <div class="container">
            <div class="ruleta-container">
                <div class="ruleta"> <img src="src/ruleta.png" alt="ruleta"> </div>
                <div class="puntero"></div>
            </div>

            <button id="girar-btn" class="primary-btn">Girar</button>
            <p id="resultado"></p>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
